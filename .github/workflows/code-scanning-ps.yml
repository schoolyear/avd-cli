name: "Code Scanning (PowerShell)"

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  scan-powershell:
    name: Scan PowerShell
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run PSScriptAnalyzer
        uses: microsoft/psscriptanalyzer-action@v1.0
        with:
          path: .\
          recurse: true
          output: results-powershell.sarif
        continue-on-error: true

      - name: Upload PowerShell scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results-powershell.sarif
          category: powershell

